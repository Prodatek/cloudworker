name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: ruff check backend/app backend/tests
      - run: ruff format --check backend/app backend/tests
      - run: mypy backend/app
        working-directory: .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudworker
          POSTGRES_PASSWORD: cloudworker
          POSTGRES_DB: cloudworker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudworker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://cloudworker:cloudworker@localhost:5432/cloudworker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: alembic upgrade head
        working-directory: backend
      - run: pytest
        working-directory: backend

  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory:
          - infra/terraform/bootstrap
          - infra/terraform/modules/networking
          - infra/terraform/modules/iam
          - infra/terraform/modules/storage
          - infra/terraform/modules/compute
          - infra/terraform/environments/dev
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check
      - run: terraform init -backend=false
      - run: terraform validate
